services:
  api:
    build:
      context: .
    command: >
      sh -c "python -m backend_pre_start &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_PREFIX: ${API_PREFIX:-/api}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      COST_PER_MESSAGE: ${COST_PER_MESSAGE:-1}
      COST_PER_EXPRESS_MESSAGE: ${COST_PER_EXPRESS_MESSAGE:-1}
      MAX_MESSAGES_PER_BATCH: ${MAX_MESSAGES_PER_BATCH:-100}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      DB_CREATE_ALL: ${DB_CREATE_ALL:-true}
      DB_PRE_START_RETRIES: ${DB_PRE_START_RETRIES:-30}
      DB_PRE_START_INTERVAL_SECONDS: ${DB_PRE_START_INTERVAL_SECONDS:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  relay-normal:
    build:
      context: .
    command: python -m infra.workers.dispatch_relay -Q normal
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}

      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}

      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}

    volumes:
      - ./src:/app/src

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped

  relay-express:
    build:
      context: .
    command: python -m infra.workers.dispatch_relay -Q express
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}

      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}

      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}

    volumes:
      - ./src:/app/src

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped

  worker-normal:
    build:
      context: .
    command: celery -A infra.workers.celery_app.celery_app worker --loglevel=${LOG_LEVEL:-INFO} -Q sms.normal
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      DB_CREATE_ALL: ${DB_CREATE_ALL:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-express:
    build:
      context: .
    command: celery -A infra.workers.celery_app.celery_app worker --loglevel=${LOG_LEVEL:-INFO} -Q sms.express
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      DB_CREATE_ALL: ${DB_CREATE_ALL:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sms_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-sms_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sms_gateway}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

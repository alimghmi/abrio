services:
  api:
    build:
      context: .
    command: >
      sh -c "python -m backend_pre_start &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      API_PREFIX: ${API_PREFIX:-/api}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_REQUEST_ID_HEADER: ${LOG_REQUEST_ID_HEADER:-X-Request-ID}
      SERVICE_NAME: ${API_SERVICE_NAME:-abrio-api}
      COST_PER_MESSAGE: ${COST_PER_MESSAGE:-1.00}
      COST_PER_EXPRESS_MESSAGE: ${COST_PER_EXPRESS_MESSAGE:-1.00}
      MAX_MESSAGES_PER_BATCH: ${MAX_MESSAGES_PER_BATCH:-100}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_FAIL_OPEN: ${RATE_LIMIT_FAIL_OPEN:-false}
      RATE_LIMIT_KEY_PREFIX: ${RATE_LIMIT_KEY_PREFIX:-sms_gateway:rate_limit}
      RATE_LIMIT_REDIS_URL: ${RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_NORMAL_MESSAGES_PER_MINUTE: ${RATE_LIMIT_NORMAL_MESSAGES_PER_MINUTE:-12000}
      RATE_LIMIT_NORMAL_MESSAGES_BURST: ${RATE_LIMIT_NORMAL_MESSAGES_BURST:-2000}
      RATE_LIMIT_EXPRESS_MESSAGES_PER_MINUTE: ${RATE_LIMIT_EXPRESS_MESSAGES_PER_MINUTE:-1200}
      RATE_LIMIT_EXPRESS_MESSAGES_BURST: ${RATE_LIMIT_EXPRESS_MESSAGES_BURST:-200}
      RATE_LIMIT_BATCH_REQUESTS_PER_MINUTE: ${RATE_LIMIT_BATCH_REQUESTS_PER_MINUTE:-120}
      RATE_LIMIT_BATCH_REQUESTS_BURST: ${RATE_LIMIT_BATCH_REQUESTS_BURST:-20}
      RATE_LIMIT_MESSAGE_STATUS_PER_MINUTE: ${RATE_LIMIT_MESSAGE_STATUS_PER_MINUTE:-2400}
      RATE_LIMIT_MESSAGE_STATUS_BURST: ${RATE_LIMIT_MESSAGE_STATUS_BURST:-400}
      RATE_LIMIT_MESSAGE_REPORTS_PER_MINUTE: ${RATE_LIMIT_MESSAGE_REPORTS_PER_MINUTE:-240}
      RATE_LIMIT_MESSAGE_REPORTS_BURST: ${RATE_LIMIT_MESSAGE_REPORTS_BURST:-40}
      RATE_LIMIT_USER_READS_PER_MINUTE: ${RATE_LIMIT_USER_READS_PER_MINUTE:-10}
      RATE_LIMIT_USER_READS_BURST: ${RATE_LIMIT_USER_READS_BURST:-100}
      RATE_LIMIT_USER_WRITES_PER_MINUTE: ${RATE_LIMIT_USER_WRITES_PER_MINUTE:-60}
      RATE_LIMIT_USER_WRITES_BURST: ${RATE_LIMIT_USER_WRITES_BURST:-15}
      RATE_LIMIT_USER_CREATES_PER_MINUTE: ${RATE_LIMIT_USER_CREATES_PER_MINUTE:-20}
      RATE_LIMIT_USER_CREATES_BURST: ${RATE_LIMIT_USER_CREATES_BURST:-5}
      RATE_LIMIT_PRICING_PER_MINUTE: ${RATE_LIMIT_PRICING_PER_MINUTE:-240}
      RATE_LIMIT_PRICING_BURST: ${RATE_LIMIT_PRICING_BURST:-40}
      RATE_LIMIT_GLOBAL_NORMAL_MESSAGES_PER_MINUTE: ${RATE_LIMIT_GLOBAL_NORMAL_MESSAGES_PER_MINUTE:-180000}
      RATE_LIMIT_GLOBAL_NORMAL_MESSAGES_BURST: ${RATE_LIMIT_GLOBAL_NORMAL_MESSAGES_BURST:-20000}
      RATE_LIMIT_GLOBAL_EXPRESS_MESSAGES_PER_MINUTE: ${RATE_LIMIT_GLOBAL_EXPRESS_MESSAGES_PER_MINUTE:-45000}
      RATE_LIMIT_GLOBAL_EXPRESS_MESSAGES_BURST: ${RATE_LIMIT_GLOBAL_EXPRESS_MESSAGES_BURST:-5000}
      RATE_LIMIT_GLOBAL_BATCH_REQUESTS_PER_MINUTE: ${RATE_LIMIT_GLOBAL_BATCH_REQUESTS_PER_MINUTE:-3000}
      RATE_LIMIT_GLOBAL_BATCH_REQUESTS_BURST: ${RATE_LIMIT_GLOBAL_BATCH_REQUESTS_BURST:-300}
      RATE_LIMIT_GLOBAL_MESSAGE_STATUS_PER_MINUTE: ${RATE_LIMIT_GLOBAL_MESSAGE_STATUS_PER_MINUTE:-120000}
      RATE_LIMIT_GLOBAL_MESSAGE_STATUS_BURST: ${RATE_LIMIT_GLOBAL_MESSAGE_STATUS_BURST:-12000}
      RATE_LIMIT_GLOBAL_MESSAGE_REPORTS_PER_MINUTE: ${RATE_LIMIT_GLOBAL_MESSAGE_REPORTS_PER_MINUTE:-12000}
      RATE_LIMIT_GLOBAL_MESSAGE_REPORTS_BURST: ${RATE_LIMIT_GLOBAL_MESSAGE_REPORTS_BURST:-1200}
      RATE_LIMIT_GLOBAL_USER_READS_PER_MINUTE: ${RATE_LIMIT_GLOBAL_USER_READS_PER_MINUTE:-30000}
      RATE_LIMIT_GLOBAL_USER_READS_BURST: ${RATE_LIMIT_GLOBAL_USER_READS_BURST:-3000}
      RATE_LIMIT_GLOBAL_USER_WRITES_PER_MINUTE: ${RATE_LIMIT_GLOBAL_USER_WRITES_PER_MINUTE:-6000}
      RATE_LIMIT_GLOBAL_USER_WRITES_BURST: ${RATE_LIMIT_GLOBAL_USER_WRITES_BURST:-600}
      RATE_LIMIT_GLOBAL_USER_CREATES_PER_MINUTE: ${RATE_LIMIT_GLOBAL_USER_CREATES_PER_MINUTE:-1200}
      RATE_LIMIT_GLOBAL_USER_CREATES_BURST: ${RATE_LIMIT_GLOBAL_USER_CREATES_BURST:-120}
      RATE_LIMIT_GLOBAL_PRICING_PER_MINUTE: ${RATE_LIMIT_GLOBAL_PRICING_PER_MINUTE:-12000}
      RATE_LIMIT_GLOBAL_PRICING_BURST: ${RATE_LIMIT_GLOBAL_PRICING_BURST:-1200}
      RATE_LIMIT_SYSTEM_REQUESTS_PER_MINUTE: ${RATE_LIMIT_SYSTEM_REQUESTS_PER_MINUTE:-300000}
      RATE_LIMIT_SYSTEM_REQUESTS_BURST: ${RATE_LIMIT_SYSTEM_REQUESTS_BURST:-30000}
      RATE_LIMIT_SYSTEM_MESSAGES_PER_MINUTE: ${RATE_LIMIT_SYSTEM_MESSAGES_PER_MINUTE:-225000}
      RATE_LIMIT_SYSTEM_MESSAGES_BURST: ${RATE_LIMIT_SYSTEM_MESSAGES_BURST:-25000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      DB_CREATE_ALL: ${DB_CREATE_ALL:-true}
      DB_PRE_START_RETRIES: ${DB_PRE_START_RETRIES:-30}
      DB_PRE_START_INTERVAL_SECONDS: ${DB_PRE_START_INTERVAL_SECONDS:-1.0}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  relay-normal:
    build:
      context: .
    command: python -m infra.workers.dispatch_relay -Q normal
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: ${RELAY_SERVICE_NAME:-abrio-relay}
      METRICS_PORT: ${RELAY_METRICS_PORT:-9101}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}

    volumes:
      - ./src:/app/src
    expose:
      - "9101"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped

  relay-express:
    build:
      context: .
    command: python -m infra.workers.dispatch_relay -Q express
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: ${RELAY_SERVICE_NAME:-abrio-relay}
      METRICS_PORT: ${RELAY_METRICS_PORT:-9101}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}

    volumes:
      - ./src:/app/src
    expose:
      - "9101"

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped

  worker-normal:
    build:
      context: .
    command: >
      sh -c "rm -rf /tmp/prometheus-multiproc &&
      mkdir -p /tmp/prometheus-multiproc &&
      celery -A infra.workers.celery_app.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO} -Q sms.normal"
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: ${WORKER_NORMAL_SERVICE_NAME:-abrio-worker-normal}
      METRICS_PORT: ${WORKER_METRICS_PORT:-9102}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-multiproc
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      DB_CREATE_ALL: ${DB_CREATE_ALL:-true}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
    volumes:
      - ./src:/app/src
    expose:
      - "9102"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-express:
    build:
      context: .
    command: >
      sh -c "rm -rf /tmp/prometheus-multiproc &&
      mkdir -p /tmp/prometheus-multiproc &&
      celery -A infra.workers.celery_app.celery_app worker
      --loglevel=${LOG_LEVEL:-INFO} -Q sms.express"
    environment:
      APP_NAME: ${APP_NAME:-abrio-gateway}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: ${WORKER_EXPRESS_SERVICE_NAME:-abrio-worker-express}
      METRICS_PORT: ${WORKER_METRICS_PORT:-9102}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-multiproc
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://sms_gateway:sms_gateway@postgres:5432/sms_gateway}
      DB_CREATE_ALL: ${DB_CREATE_ALL:-true}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${DOCKER_CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${DOCKER_CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
    volumes:
      - ./src:/app/src
    expose:
      - "9102"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sms_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-sms_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sms_gateway}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_prometheus &&
      rabbitmq-server"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    external: true
    name: abrio-network
